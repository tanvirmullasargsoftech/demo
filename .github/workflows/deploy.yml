name: Deploy Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ Use latest version (fix Node.js warning)
    - name: Checkout Code
      uses: actions/checkout@v4

    # ✅ Copy files to EC2
    - name: Copy Files to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        port: 22
        source: "."
        target: "/var/www/html/"
        rm: true
        debug: true

    # ✅ Restart Nginx
    - name: Restart Nginx
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        port: 22
        script: |
          sudo systemctl restart nginx
